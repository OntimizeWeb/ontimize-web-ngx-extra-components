<div class="o-data-view-container">

  <o-button-toggle-group #toggleGroup *ngIf="!showToggleOnToolbar && !showToggleFloatable && showToggleButton" class="button-toggle-group"
    attr="toggleGroup" multiple="no" [value]="defaultView" (onChange)="changeView($event)">
    <o-button-toggle attr="toggle1" value="table" icon="storage"></o-button-toggle>
    <o-button-toggle attr="toggle2" value="grid" icon="view_module"></o-button-toggle>
  </o-button-toggle-group>

  <div class="o-data-view-component">

    <o-table #table *ngIf="defaultView === 'table'" [attr]="r_attr" [columns]="r_columns" [configure-service-args]="r_configureServiceArgs"
      [entity]="r_entity" [keys]="r_keys" [pageable]="r_pageable" [paginated-query-method]="r_paginatedQueryMethod" [parent-keys]="r_parentKeys"
      [query-fallback-function]="r_queryFallbackFunction" [query-method]="r_queryMethod" [query-on-bind]="r_queryOnBind"
      [query-on-init]="r_queryOnInit" [query-rows]="r_queryRows" [query-with-null-parent-keys]="r_queryWithNullParentKeys" [service]="r_service"
      [service-type]="r_serviceType" [static-data]="r_staticData" [store-state]="r_storeState" [delete-method]="r_deleteMethod"
      [insert-method]="r_insertMethod" [update-method]="r_updateMethod" [controls]="r_controls"
      [detail-button-in-row]="r_table_detailButtonInRow" [detail-button-in-row-icon]="r_table_detailButtonInRowIcon"
      [detail-form-route]="r_detailFormRoute" [detail-mode]="r_detailMode" [edit-button-in-row]="r_table_editButtonInRow"
      [edit-button-in-row-icon]="r_table_editButtonInRowIcon" [edit-form-route]="r_table_editFormRoute" [enabled]="r_table_enabled"
      [filter-case-sensitive]="r_filterCaseSensitive" [insert-button]="r_insertButton" [insert-form-route]="r_insertFormRoute"
      [page-size-options]="r_pageSizeOptions" [pagination-controls]="r_paginationControls" [quick-filter]="r_quickFilter"
      [quick-filter-placeholder]="r_quickFilterPlaceholder" [recursive-detail]="r_recursiveDetail" [recursive-edit]="r_recursiveEdit"
      [recursive-insert]="r_recursiveInsert" [row-height]="r_table_rowHeight" [title]="r_title" [visible]="r_table_visible"
      [auto-adjust]="r_table_autoAdjust" [auto-align-titles]="r_table_autoAlignTitles" [collapse-grouped-columns]="r_table_collapseGroupedColumns"
      [columns-visibility-button]="r_table_columnsVisibilityButton" [default-visible-columns]="r_table_defaultVisibleColumns"
      [delete-button]="r_table_deleteButton" [disable-selection-function]="r_table_disableSelectionFunction" [edition-mode]="r_table_editionMode"
      [export-button]="r_table_exportButton" [export-service-type]="r_table_exportServiceType"
      [filter-column-active-by-default]="r_table_filterColumnActiveByDefault" [fixed-header]="r_fixedHeader" [groupable]="r_table_groupable"
      [grouped-columns]="r_table_groupedColumns" [horizontal-scroll]="r_table_horizontalScroll" [keep-selected-items]="r_table_keepSelectedItems"
      [multiple-sort]="r_table_multipleSort" [non-hidable-columns]="r_table_nonHidableColumns" [quick-filter-function]="r_table_quickFilterFunction"
      [refresh-button]="r_refreshButton" [resizable]="r_table_resizable" [row-class]="r_table_rowClass"
      [select-all-checkbox]="r_table_selectAllCheckbox" [select-all-checkbox-visible]="r_table_selectAllCheckboxVisible"
      [selection-mode]="r_table_selectionMode" [show-buttons-text]="r_showButtonsText" [show-configuration-option]="r_table_showConfigurationOption"
      [show-expandable-icon-function]="r_table_showExpandableIconFunction" [show-filter-option]="r_table_showFilterOption"
      [show-paginator-first-last-buttons]="r_table_showPaginatorFirstLastButtons" [show-report-on-demand-option]="r_table_showReportOnDemandOption"
      [show-reset-width-option]="r_table_showResetWidthOption" [show-title]="r_table_showTitle" [sort-columns]="r_table_sortColumns"
      [virtual-scroll]="r_table_virtualScroll" [visible-columns]="r_table_visibleColumns"
      [visible-export-dialog-buttons]="r_table_visibleExportDialogButtons" [show-charts-on-demand-option]="r_table_showChartsOnDemandOption">

      <o-button-toggle-group #toggleGroup *ngIf="showToggleOnToolbar" class="toggle-toolbar" attr="toggleGroup" o-table-toolbar position="end"
        multiple="no" [value]="defaultView" (onChange)="changeView($event)">
        <o-button-toggle attr="toggle1" value="table" icon="storage"></o-button-toggle>
        <o-button-toggle attr="toggle2" value="grid" icon="view_module"></o-button-toggle>
      </o-button-toggle-group>

    </o-table>

    <o-grid #grid class="data-view-grid" *ngIf="defaultView === 'grid'" [attr]="r_attr" [columns]="r_columns" [configure-service-args]="r_configureServiceArgs"
      [entity]="r_entity" [keys]="r_keys" [pageable]="r_pageable" [paginated-query-method]="r_paginatedQueryMethod" [parent-keys]="r_parentKeys"
      [query-fallback-function]="r_queryFallbackFunction" [query-method]="r_queryMethod" [query-on-bind]="r_queryOnBind"
      [query-on-init]="r_queryOnInit" [query-rows]="r_queryRows" [query-with-null-parent-keys]="r_queryWithNullParentKeys" [service]="r_service"
      [service-type]="r_serviceType" [static-data]="r_staticData" [store-state]="r_storeState" [controls]="r_controls"
      [detail-form-route]="r_detailFormRoute" [detail-mode]="r_detailMode" [enabled]="r_grid_enabled" [quick-filter]="r_quickFilter"
      [quick-filter-placeholder]="r_quickFilterPlaceholder" [quick-filter-appearance]="r_quickFilterAppearance"
      [recursive-detail]="r_recursiveDetail" [title]="r_title" [visible]="r_grid_visible" [cols]="r_grid_cols"
      [fixed-header]="r_fixedHeader" [grid-item-height]="r_grid_gridItemHeight" [gutter-size]="r_grid_gutterSize"
      [insert-button]="r_insertButton" [insert-button-floatable]="r_grid_insertButtonFloatable" [insert-button-position]="r_grid_insertButtonPosition"
      [orderable]="r_grid_orderable" [page-size-options]="r_pageSizeOptions" [pagination-controls]="r_paginationControls"
      [quick-filter-columns]="r_quickFilterColumns" [refresh-button]="r_refreshButton" [show-buttons-text]="r_showButtonsText"
      [show-footer]="r_grid_showFooter" [show-page-size]="r_grid_showPageSize" [sort-column]="r_grid_sortColumn"
      [sortable-columns]="r_grid_sortableColumns">

      <o-button-toggle-group #toggleGroup *ngIf="showToggleOnToolbar" class="toggle-toolbar" attr="toggleGroup" o-grid-toolbar position="end"
        multiple="no" [value]="defaultView" (onChange)="changeView($event)">
        <o-button-toggle attr="toggle1" value="table" icon="storage"></o-button-toggle>
        <o-button-toggle attr="toggle2" value="grid" icon="view_module"></o-button-toggle>
      </o-button-toggle-group>

      <o-grid-item *ngFor="let row of grid.dataArray; let i = index">
        <ng-container [ngTemplateOutlet]="gridItemTpl?.template" [ngTemplateOutletContext]="{ $implicit: row, row: row, index: i }">
        </ng-container>
      </o-grid-item>

    </o-grid>

    <o-button-toggle-group #toggleGroup *ngIf="showToggleFloatable" class="button-toggle-floatable" attr="toggleGroup" multiple="no"
      [value]="defaultView" (onChange)="changeView($event)">
      <o-button-toggle attr="toggle1" value="table" icon="storage"></o-button-toggle>
      <o-button-toggle attr="toggle2" value="grid" icon="view_module"></o-button-toggle>
    </o-button-toggle-group>

  </div>

</div>

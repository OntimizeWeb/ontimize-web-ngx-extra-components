<o-button-toggle-group fxLayoutAlign="end" attr="toggleGroup" layout="row" multiple="no" [value]="currentView" layout-padding
  (onChange)="changeView($event)">

  <o-button-toggle attr="toggle1" value="table" icon="storage"></o-button-toggle>
  <o-button-toggle attr="toggle2" value="grid" icon="view_module"></o-button-toggle>
  <o-button-toggle attr="toggle3" value="list" icon="list"></o-button-toggle>
</o-button-toggle-group>

<div class="o-data-view-container">

  <o-table #table *ngIf="currentView === 'table'" [attr]="r_attr" [columns]="r_columns" [configure-service-args]="r_configureServiceArgs" [entity]="r_entity" [keys]="r_keys"
    [pageable]="r_pageable" [paginated-query-method]="r_paginatedQueryMethod" [parent-keys]="r_parentKeys" [query-fallback-function]="r_queryFallbackFunction"
    [query-method]="r_queryMethod" [query-on-bind]="r_queryOnBind" [query-on-init]="r_queryOnInit" [query-rows]="r_queryRows"
    [query-with-null-parent-keys]="r_queryWithNullParentKeys" [service]="r_service" [service-type]="r_serviceType" [static-data]="r_staticData"
    [store-state]="r_storeState">
  </o-table>

  <o-grid #grid *ngIf="currentView === 'grid'" [attr]="r_attr" [columns]="r_columns" [configure-service-args]="r_configureServiceArgs" [entity]="r_entity" [keys]="r_keys"
    [pageable]="r_pageable" [paginated-query-method]="r_paginatedQueryMethod" [parent-keys]="r_parentKeys" [query-fallback-function]="r_queryFallbackFunction"
    [query-method]="r_queryMethod" [query-on-bind]="r_queryOnBind" [query-on-init]="r_queryOnInit" [query-rows]="r_queryRows"
    [query-with-null-parent-keys]="r_queryWithNullParentKeys" [service]="r_service" [service-type]="r_serviceType" [static-data]="r_staticData"
    [store-state]="r_storeState">

    <ng-container *ngIf="gridItemTpl?.template as tpl">
      <o-grid-item *ngFor="let row of grid.dataArray; let i = index">
        <ng-container [ngTemplateOutlet]="tpl" [ngTemplateOutletContext]="{ $implicit: row, row: row, index: i }">
        </ng-container>
      </o-grid-item>
    </ng-container>

  </o-grid>

  <o-list #list *ngIf="currentView === 'list'" [attr]="r_attr" [columns]="r_columns" [configure-service-args]="r_configureServiceArgs" [entity]="r_entity" [keys]="r_keys"
    [pageable]="r_pageable" [paginated-query-method]="r_paginatedQueryMethod" [parent-keys]="r_parentKeys" [query-fallback-function]="r_queryFallbackFunction"
    [query-method]="r_queryMethod" [query-on-bind]="r_queryOnBind" [query-on-init]="r_queryOnInit" [query-rows]="r_queryRows"
    [query-with-null-parent-keys]="r_queryWithNullParentKeys" [service]="r_service" [service-type]="r_serviceType" [static-data]="r_staticData"
    [store-state]="r_storeState">

    <ng-container *ngIf="listItemTpl?.template">
      <ng-container *ngFor="let row of list.dataArray; let i = index">
        <ng-container [ngTemplateOutlet]="listItemTpl!.template" [ngTemplateOutletContext]="{ $implicit: row, row: row, index: i }">
        </ng-container>
      </ng-container>
    </ng-container>

  </o-list>

</div>

<o-button-toggle-group fxLayoutAlign="end" attr="toggleGroup" layout="row" multiple="no" [value]="currentView" layout-padding
  (onChange)="changeView($event)">
  <o-button-toggle attr="toggle1" value="table" icon="storage"></o-button-toggle>
  <o-button-toggle attr="toggle2" value="grid" icon="view_module"></o-button-toggle>
  <o-button-toggle attr="toggle3" value="list" icon="list"></o-button-toggle>
</o-button-toggle-group>

<div class="o-data-view-content">

  <o-table *ngIf="currentView === 'table'" #table [static-data]="config.staticData" [keys]="config.keys" [columns]="config.columns">
  </o-table>

  <o-grid *ngIf="currentView === 'grid'" #grid [static-data]="config.staticData" [keys]="config.keys" [columns]="config.columns">

    <ng-container *ngIf="gridItemTpl?.template as tpl">
      <o-grid-item *ngFor="let row of grid.dataArray; let i = index">
        <ng-container [ngTemplateOutlet]="tpl" [ngTemplateOutletContext]="{ $implicit: row, row: row, index: i }">
        </ng-container>
      </o-grid-item>
    </ng-container>

  </o-grid>

  <o-list *ngIf="currentView === 'list'" #list [static-data]="config.staticData" [keys]="config.keys" [columns]="config.columns">

    <ng-container *ngIf="listItemTpl?.template">
      <ng-container *ngFor="let row of list.dataArray; let i = index">
        <ng-container [ngTemplateOutlet]="listItemTpl!.template" [ngTemplateOutletContext]="{ $implicit: row, row: row, index: i }">
        </ng-container>
      </ng-container>
    </ng-container>

  </o-list>

</div>

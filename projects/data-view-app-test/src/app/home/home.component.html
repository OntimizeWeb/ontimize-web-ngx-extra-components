<o-app-layout>
  <o-data-view default-view="list" attr="dataView" service-type="packs" entity="packs" keys="id" columns="id;name;location;price">

    <ng-template oDataViewGridItem let-item>
      <div>{{ item.name }}</div>
    </ng-template>

    <ng-template oDataViewListItem let-row>
      <o-list-item-text [title]="row.name"></o-list-item-text>
    </ng-template>

  </o-data-view>
</o-app-layout>

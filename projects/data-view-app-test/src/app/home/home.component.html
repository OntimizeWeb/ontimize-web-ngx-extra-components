<o-app-layout>
  <!--
  <button mat-button (click)="dv.changeView('grid')">Vista grid</button>
  <button mat-button (click)="dv.changeView('table')">Vista tabla</button> -->

  <o-data-view #dv attr="dataView" [static-data]="config.staticData" keys="id" columns="id;name;sector;country;annualRevenue;rating" query-rows="5"
    [table-config]="config.tableCfg" [grid-config]="config.gridCfg" query-on-init="false" quick-filter-placeholder="Search" refresh-button="no">

    <ng-template oDataViewTableColumns>
      <o-table-column attr="annualRevenue" title="Annual Revenue" type="currency" thousand-separator="." decimal-separator="," currency-symbol="€"
        currency-symbol-position="right"></o-table-column>
    </ng-template>


    <ng-template oDataViewGridItem let-item>
      <mat-card class="grid-card">
        <mat-card-header>
          <mat-card-title>{{ item.name }}</mat-card-title>
          <mat-card-subtitle>{{ item.sector }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <div fxLayout="column" fxLayoutAlign="center">Since {{item.foundedYear}}</div>
          <div fxLayout="column" fxLayoutAlign="end end">
            <mat-icon>info</mat-icon>
          </div>
        </mat-card-content>
      </mat-card>
    </ng-template>

  </o-data-view>
</o-app-layout>
